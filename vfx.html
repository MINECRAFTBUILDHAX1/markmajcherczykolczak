<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compositing Portfolio</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- Font Awesome (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* Header */
    .header {
      margin-top: 40px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }

    .name {
      font-size: 42px;
      color: #ffffff;
    }

    .role {
      font-size: 20px;
      color: #d6a4b4; /* soft pink */
      margin-top: 5px;
    }

    /* Vimeo placeholder */
    .video-container {
      width: 80%;
      max-width: 900px;
      height: 500px;
      margin: 60px auto 60px auto;
      background-color: #111;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 18px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-bottom: 80px;
    }

    .socials a {
      color: #d6a4b4;
      text-decoration: none;
      font-size: 28px;
      transition: 0.3s ease;
    }

    .socials a:hover {
      color: #ffffff;
      transform: translateY(-5px);
    }

    .social-label {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .social-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="name">MARK MAJCHERCZYK-OLCZAK</div>
    <div class="role">COMPOSITOR</div>
  </div>

  <!-- Vimeo placeholder -->
  <div class="video-container">
    Vimeo video goes here
  </div>

  <!-- Social icons -->
  <div class="socials">

    <div class="social-item">
      <a href="https://www.linkedin.com/in/mark-majcherczyk-olczak-112080321/" target="_blank">
        <i class="fab fa-linkedin-in"></i>
      </a>
      <div class="social-label">LinkedIn</div>
    </div>

    <div class="social-item">
      <a href="https://www.imdb.com/name/nm17548614/" target="_blank">
        <i class="fas fa-film"></i>
      </a>
      <div class="social-label">IMDb</div>
    </div>

  </div>

</body>
</html>
