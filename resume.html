<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume | Mark Majcherczyk-Olczak</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      width: 90%;
      margin: 0 auto;
      padding: 50px 0;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .subtitle {
      color: #b3b3b3;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .button-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .download-btn {
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.25s ease;
      box-shadow: 0 8px 30px rgba(255,255,255,0.08);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .resume-container {
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 1000px;
      border: none;
      background: #fff;
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 0.95rem;
      padding: 30px 20px;
    }

    @media (max-width: 768px) {
      .container {
        width: 95%;
        padding: 30px 0;
      }

      iframe {
        height: 700px;
      }

      .download-btn {
        width: 100%;
        max-width: 300px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="hero">
      <h1>Mark Majcherczyk-Olczak</h1>
      <p class="subtitle">
        Filmmaker • Compositor • Composer • Entrepreneur
      </p>

      <div class="button-wrapper">
        <a href="resume.pdf" download class="download-btn">
          Download Resume
        </a>
      </div>
    </section>

    <div class="resume-container">
      <iframe src="resume.pdf"></iframe>
    </div>
  </div>

  <footer>
    © 2026 Mark Majcherczyk-Olczak
  </footer>
</body>
</html>
